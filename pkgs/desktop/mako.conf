# Everforest — mako notification config

font=Rubik 11
background-color=#2d353bee
text-color=#d3c6aa
border-color=#475258
border-size=2
border-radius=12
padding=12
margin=12
width=350
max-visible=3
default-timeout=5000
layer=overlay

# Anchor to top-right (like GNOME)
anchor=top-right

[urgency=low]
border-color=#475258
background-color=#232a2eee

[urgency=normal]
border-color=#83c092
background-color=#2d353bee

[urgency=critical]
border-color=#e67e80
background-color=#2d353bee
default-timeout=0

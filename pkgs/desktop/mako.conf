# Alpine Dusk — mako notification config

font=Rubik 11
background-color=#1e2d30ee
text-color=#d0dce0
border-color=#2e4548
border-size=2
border-radius=12
padding=12
margin=12
width=350
max-visible=3
default-timeout=5000
layer=overlay

# Anchor to top-right (like GNOME)
anchor=top-right

[urgency=low]
border-color=#2e4548
background-color=#141c1fee

[urgency=normal]
border-color=#5aada8
background-color=#1e2d30ee

[urgency=critical]
border-color=#c45858
background-color=#1e2d30ee
default-timeout=0

// Logitech MX Master 3 — logiops (logid) configuration
// Gesture button (thumb) maps swipe directions to niri actions:
//   No direction (tap) → Overview toggle       (Super+O)
//   Up                 → Previous workspace    (Super+Page_Up)
//   Down               → Next workspace        (Super+Page_Down)
//   Left               → Focus column left      (Super+Left)
//   Right              → Focus column right     (Super+Right)
devices: (
  {
    name: "Wireless Mouse MX Master 3";
    dpi: 1000;

    // Thumb / gesture button
    buttons: (
      {
        cid: 0xc3;
        action: {
          type: "Gestures";
          gestures: (
            {
              direction: "None";
              mode: "OnRelease";
              action: {
                type: "Keypress";
                keys: ["KEY_LEFTMETA", "KEY_O"];
              };
            },
            {
              direction: "Up";
              mode: "OnRelease";
              action: {
                type: "Keypress";
                keys: ["KEY_LEFTMETA", "KEY_PAGEUP"];
              };
            },
            {
              direction: "Down";
              mode: "OnRelease";
              action: {
                type: "Keypress";
                keys: ["KEY_LEFTMETA", "KEY_PAGEDOWN"];
              };
            },
            {
              direction: "Left";
              mode: "OnRelease";
              action: {
                type: "Keypress";
                keys: ["KEY_LEFTMETA", "KEY_LEFT"];
              };
            },
            {
              direction: "Right";
              mode: "OnRelease";
              action: {
                type: "Keypress";
                keys: ["KEY_LEFTMETA", "KEY_RIGHT"];
              };
            }
          );
        };
      }
    );
  }
);

# Everforest — hyprlock config

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# ---- Blurred wallpaper background ----
background {
    monitor =
    path = /home/matei/.local/share/wallpapers/wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.85
    brightness = 0.55
    vibrancy = 0.1
    color = rgba(23, 2a, 2e, 1.0)
}

# ---- Keroro avatar (circular) ----
image {
    monitor =
    path = /home/matei/.local/share/wallpapers/user-photo.jpg
    size = 160
    rounding = -1
    border_size = 4
    border_color = rgba(71, 82, 88, 1.0)
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 180
    halign = center
    valign = center
}

# ---- Hostname ----
label {
    monitor =
    text = matei@rewot-smibmuhb
    color = rgba(211, 198, 170, 0.35)
    font_size = 14
    font_family = JetBrains Mono
    position = 0, 58
    halign = center
    valign = center
}

# ---- Clock ----
label {
    monitor =
    text = $TIME
    color = rgba(211, 198, 170, 1.0)
    font_size = 48
    font_family = Rubik Light
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, -16
    halign = center
    valign = center
}

# ---- Date ----
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(211, 198, 170, 0.45)
    font_size = 14
    font_family = Rubik
    position = 0, -56
    halign = center
    valign = center
}

# ---- Password input (pill shape) ----
input-field {
    monitor =
    size = 300, 48
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(71, 82, 88, 1.0)
    inner_color = rgba(35, 42, 46, 0.5)
    font_color = rgba(211, 198, 170, 1.0)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text =
    hide_input = false
    rounding = -1
    check_color = rgba(167, 192, 128, 1.0)
    fail_color = rgba(230, 126, 128, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgba(219, 188, 127, 1.0)
    position = 0, -130
    halign = center
    valign = center
}

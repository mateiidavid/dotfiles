# Alpine Dusk — hyprlock config (Option D: Compact Stack)

general {
    disable_loading_bar = false
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = true
}

# ---- Blurred wallpaper background ----
background {
    monitor =
    path = /home/matei/.local/share/wallpapers/wallpaper.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.01
    contrast = 0.85
    brightness = 0.55
    vibrancy = 0.1
    color = rgba(14, 1c, 1f, 1.0)
}

# ---- Keroro avatar (circular, 160px) ----
image {
    monitor =
    path = /home/matei/.local/share/wallpapers/user-photo.jpg
    size = 160
    rounding = -1
    border_size = 4
    border_color = rgba(46, 69, 72, 1.0)
    shadow_passes = 2
    shadow_size = 8
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 130
    halign = center
    valign = center
}

# ---- Hostname (terminal-style) ----
label {
    monitor =
    text = <span foreground="#408a70">❯</span> <span foreground="#5aada8">matei</span><span foreground="#2e4548">@</span><span foreground="#5888b0">rewot-smibmuhb</span> <span foreground="#d0dce066">~</span>
    color = rgba(208, 220, 224, 1.0)
    font_size = 13
    font_family = JetBrains Mono
    position = 0, 38
    halign = center
    valign = center
}

# ---- Clock ----
label {
    monitor =
    text = $TIME
    color = rgba(208, 220, 224, 1.0)
    font_size = 42
    font_family = Rubik Light
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0, 0, 0, 0.5)
    position = 0, 4
    halign = center
    valign = center
}

# ---- Date ----
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(208, 220, 224, 0.45)
    font_size = 12
    font_family = Rubik
    position = 0, -26
    halign = center
    valign = center
}

# ---- Password input (pill shape) ----
input-field {
    monitor =
    size = 280, 44
    outline_thickness = 1
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(46, 69, 72, 1.0)
    inner_color = rgba(20, 28, 31, 0.5)
    font_color = rgba(208, 220, 224, 1.0)
    fade_on_empty = true
    fade_timeout = 2000
    placeholder_text =
    hide_input = false
    rounding = -1
    check_color = rgba(64, 138, 112, 1.0)
    fail_color = rgba(196, 88, 88, 1.0)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgba(201, 168, 76, 1.0)
    position = 0, -80
    halign = center
    valign = center
}

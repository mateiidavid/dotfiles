# Everforest — swaylock-effects config

# Background: wallpaper with blur + vignette via swaylock-effects
image=/home/matei/.local/share/wallpapers/wallpaper.jpg
scaling=fill

# Effects (swaylock-effects native)
effect-blur=12x5
effect-vignette=0.5:0.5

# Clock & info
clock
timestr=%H:%M
datestr=matei@rewot-smibmuhb

# Indicator ring with keroro avatar
indicator
indicator-radius=80
indicator-thickness=12
indicator-image=/home/matei/.local/share/wallpapers/user-photo.jpg

# Colors — Everforest
inside-color=232a2edd
inside-clear-color=232a2edd
inside-ver-color=2d353bdd
inside-wrong-color=e67e80dd

ring-color=475258ff
ring-clear-color=a7c080ff
ring-ver-color=83c092ff
ring-wrong-color=e67e80ff

key-hl-color=a7c080ff
bs-hl-color=dbbc7fff

line-color=00000000
line-clear-color=00000000
line-ver-color=00000000
line-wrong-color=00000000

separator-color=00000000

text-color=d3c6aaff
text-clear-color=d3c6aaff
text-ver-color=d3c6aaff
text-wrong-color=e67e80ff

# Font
font=Rubik
font-size=18

# Behaviour
daemonize
ignore-empty-password
show-failed-attempts

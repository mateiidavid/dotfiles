# Alpine Dusk — swaylock-effects config (Option B: Compact Stack)

# Background: wallpaper with blur + vignette via swaylock-effects
image=/home/matei/.local/share/wallpapers/wallpaper.jpg
scaling=fill

# Effects (swaylock-effects native)
effect-blur=12x5
effect-vignette=0.5:0.5

# Clock & info

timestr=%H:%M
datestr=matei@rewot-smibmuhb

# Indicator ring with keroro avatar
indicator
indicator-radius=80
indicator-thickness=12
indicator-image=/home/matei/.local/share/wallpapers/user-photo.jpg

# Colors — Alpine Dusk
inside-color=141c1fdd
inside-clear-color=141c1fdd
inside-ver-color=1e2d30dd
inside-wrong-color=c45858dd

ring-color=2e4548ff
